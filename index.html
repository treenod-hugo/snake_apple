<script>
/* ════════════════════════════════════════
   상수 / 설정
════════════════════════════════════════ */
const COLS = 38, ROWS = 24, CS = 22
const GOLDEN_TTL = 8000, GOLDEN_PTS = 3, GOLDEN_CHANCE = 0.4
const DIFF = {
  NORMAL:{ base:140, perApple:3,  perMile:12, min:60,  label:'보통',  emoji:'🟢' },
  HARD:  { base:95,  perApple:6,  perMile:20, min:42,  label:'어려움',emoji:'🟠' },
  HELL:  { base:65,  perApple:3,  perMile:10, min:38,  label:'지옥',  emoji:'🔴' },
}
const OPPOSITE = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' }
const NICK_ADJ = ['용감한','느린','빠른','졸린','배고픈','호기심많은','신중한','엉뚱한','당당한','수줍은','활발한','조용한','웃긴','진지한','눈치없는']
const NICK_ANI = ['호랑이','판다','여우','토끼','곰','고양이','강아지','늑대','너구리','다람쥐','수달','고슴도치','기린','코끼리','펭귄']

/* ════════════════════════════════════════
   게임 상태
════════════════════════════════════════ */
let gs = null   // game state (아래 makeGS 참조)
let loopId = null, lastMove = 0
let curDir = 'RIGHT', pendDir = 'RIGHT'
let obsRef = [], diffRef = 'NORMAL', speedRef = 140, playing = false

function calcSpeed(diff, score){
  const c = DIFF[diff]
  return Math.max(c.min, c.base - score*c.perApple - Math.floor(score/10)*c.perMile)
}
function calcObsCount(score){ return Math.floor(score/5) }

function makeGS(diff){
  const snake = [{x:8,y:12},{x:7,y:12},{x:6,y:12}]
  return {
    snake, apple: rndPos(snake), goldenApple:null,
    obstacles:[], obstacleGroupCount:0,
    direction:'RIGHT', score:0, status:'IDLE',
    difficulty:diff, speed:DIFF[diff].base
  }
}

function rndPos(exclude){
  const occ = new Set(exclude.map(p=>`${p.x},${p.y}`))
  let p
  do { p={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)} }
  while(occ.has(`${p.x},${p.y}`))
  return p
}

/* ════════════════════════════════════════
   장애물 모양 스폰 (7가지)
════════════════════════════════════════ */
const SHAPES = [
  [[0,0],[1,0],[2,0]],              // 0: 가로 직선
  [[0,0],[0,1],[0,2]],              // 1: 세로 직선
  [[0,0],[0,1],[1,1]],              // 2: L자
  [[1,0],[0,1],[1,1]],              // 3: 역L자
  [[0,0],[1,0],[2,0],[1,1]],        // 4: T자
  [[0,0],[1,0],[1,1],[2,1]],        // 5: Z형
  [[0,0],[1,0],[0,1],[1,1]],        // 6+: 2×2
]
function spawnShape(taken, groupIdx){
  const occ = new Set(taken.map(p=>`${p.x},${p.y}`))
  const offsets = SHAPES[Math.min(groupIdx, SHAPES.length-1)]
  const fits = (bx,by,offs) => offs.every(([dx,dy])=>{
    const nx=bx+dx, ny=by+dy
    return nx>=1&&nx<COLS-1&&ny>=1&&ny<ROWS-1&&!occ.has(`${nx},${ny}`)
  })
  for(let a=0;a<400;a++){
    const bx=2+Math.floor(Math.random()*(COLS-5))
    const by=2+Math.floor(Math.random()*(ROWS-5))
    if(fits(bx,by,offsets)) return offsets.map(([dx,dy])=>({x:bx+dx,y:by+dy}))
  }
  // 폴백
  for(let a=0;a<200;a++){
    const bx=2+Math.floor(Math.random()*(COLS-5))
    const by=2+Math.floor(Math.random()*(ROWS-5))
    if(fits(bx,by,[[0,0],[1,0],[2,0]])) return [[0,0],[1,0],[2,0]].map(([dx,dy])=>({x:bx+dx,y:by+dy}))
  }
  return [rndPos(taken)]
}

/* ════════════════════════════════════════
   오디오 (Web Audio API)
════════════════════════════════════════ */
let actx = null
let bgmStop = null

function getActx(){
  if(!actx) actx = new AudioContext()
  return actx
}
function tone(freq, startAt, dur, gain, type='square'){
  const ctx = getActx()
  const osc = ctx.createOscillator()
  const g   = ctx.createGain()
  osc.connect(g); g.connect(ctx.destination)
  osc.type = type
  osc.frequency.setValueAtTime(freq, startAt)
  g.gain.setValueAtTime(gain, startAt)
  g.gain.exponentialRampToValueAtTime(0.0001, startAt+dur)
  osc.start(startAt); osc.stop(startAt+dur+.01)
}
function sfxApple(){
  const ctx=getActx(), t=ctx.currentTime
  tone(880,t,.08,.10); tone(1320,t+.07,.08,.08)
}
function sfxGolden(){
  const ctx=getActx(), t=ctx.currentTime
  tone(880,t,.07,.10); tone(1100,t+.07,.07,.09); tone(1320,t+.14,.07,.09); tone(1760,t+.21,.12,.11)
}
function sfxGameOver(){
  const ctx=getActx(), t=ctx.currentTime
  tone(440,t,.15,.11,'sawtooth'); tone(330,t+.16,.15,.11,'sawtooth'); tone(220,t+.32,.25,.11,'sawtooth')
}
function sfxObs(){
  const ctx=getActx(), t=ctx.currentTime
  tone(120,t,.12,.08,'sawtooth'); tone(90,t+.10,.15,.06,'sawtooth')
}
function startBgm(){
  if(bgmStop) return
  const ctx=getActx()
  const mel=[[523,.15],[0,.05],[659,.15],[0,.05],[784,.20],[0,.05],[659,.15],[0,.05],
             [523,.15],[0,.05],[494,.15],[0,.05],[440,.25],[0,.10],
             [392,.15],[0,.05],[440,.15],[0,.05],[494,.20],[0,.05],[440,.15],[0,.05],
             [392,.15],[0,.05],[349,.15],[0,.05],[330,.30],[0,.15]]
  const G=0.035
  let running=true, timer=null
  const loopDur = mel.reduce((s,[,d])=>s+d,0)
  const sched=(start)=>{
    if(!running) return
    let t=start
    for(const [f,d] of mel){ if(f>0) tone(f,t,d*.85,G); t+=d }
    const ms=Math.max(0,(start+loopDur-.25-ctx.currentTime)*1000)
    timer=setTimeout(()=>sched(start+loopDur), ms)
  }
  sched(ctx.currentTime+.1)
  bgmStop=()=>{ running=false; if(timer)clearTimeout(timer); bgmStop=null }
}
function stopBgm(){ if(bgmStop) bgmStop() }

/* ════════════════════════════════════════
   닉네임 / 랭킹
════════════════════════════════════════ */
const RANK_KEY='excel-snake-rankings', NICK_KEY='excel-snake-nickname'
function genNick(){ return `익명의 ${NICK_ADJ[Math.floor(Math.random()*NICK_ADJ.length)]} ${NICK_ANI[Math.floor(Math.random()*NICK_ANI.length)]}` }
function loadNick(){ return localStorage.getItem(NICK_KEY)||genNick() }
function saveNick(n){ const v=n.trim()||genNick(); localStorage.setItem(NICK_KEY,v); return v }
function loadRanks(){ try{ return JSON.parse(localStorage.getItem(RANK_KEY)||'[]') }catch{ return [] } }
function addRank(score, diff){
  const nick=loadNick()
  const ranks=loadRanks()
  ranks.push({id:crypto.randomUUID(), nickname:nick, score, difficulty:diff, date:new Date().toLocaleDateString('ko-KR')})

}

function renderGrid(){
  if(!gs) return
  const headKey = gs.snake.length>0 ? `${gs.snake[0].x},${gs.snake[0].y}` : ''
  const snakeSet = new Set(gs.snake.map(p=>`${p.x},${p.y}`))
  const obsSet   = new Set(gs.obstacles.map(p=>`${p.x},${p.y}`))
  const now = Date.now()
  const goldenUrgent = gs.goldenApple && (gs.goldenApple.expiresAt - now) < 3000

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const key=`${x},${y}`
      let cls='gc'
      if(key===headKey) cls+=' gc-head'
      else if(snakeSet.has(key)) cls+=' gc-body'
      else if(gs.apple && gs.apple.x===x && gs.apple.y===y) cls+=' gc-apple'
      else if(gs.goldenApple && gs.goldenApple.position.x===x && gs.goldenApple.position.y===y)
        cls += goldenUrgent ? ' gc-golden-u' : ' gc-golden'
      else if(obsSet.has(key)) cls+=' gc-obs'
      cells[y][x].className=cls
    }
  }
}

/* ════════════════════════════════════════
   게임 루프
════════════════════════════════════════ */
function startGame(){
  stopLoop(); stopBgm()
  gs=makeGS(diffRef)
  gs.status='PLAYING'
  obsRef=[]; speedRef=gs.speed; curDir='RIGHT'; pendDir='RIGHT'
  playing=true; lastMove=Date.now()
  hideOverlay(); renderGrid(); renderInfoPanel()
  startBgm(); startLoop()
}

function startLoop(){
  if(loopId) clearInterval(loopId)
  lastMove=Date.now()
  loopId=setInterval(tick, 16)
}
function stopLoop(){
  if(loopId){ clearInterval(loopId); loopId=null }
}

let prevScore=0, prevApple={x:-1,y:-1}, prevHadGolden=false, prevGoldenPos={x:-1,y:-1}
let prevObsLen=0

function tick(){
  if(!playing||!gs||gs.status!=='PLAYING') return
  const now=Date.now()
  const shouldMove = now-lastMove >= speedRef

  // 황금사과 만료
  if(gs.goldenApple && now >= gs.goldenApple.expiresAt){
    gs.goldenApple=null
  }

  if(shouldMove){
    // 방향 결정
    if(pendDir !== OPPOSITE[curDir]) curDir=pendDir
    lastMove=now

    const head=gs.snake[0]
    const next={
      x: curDir==='LEFT'?head.x-1:curDir==='RIGHT'?head.x+1:head.x,
      y: curDir==='UP'  ?head.y-1:curDir==='DOWN' ?head.y+1:head.y,
    }

    // 충돌
    if(next.x<0||next.x>=COLS||next.y<0||next.y>=ROWS||
       gs.snake.slice(0,-1).some(p=>p.x===next.x&&p.y===next.y)||
       gs.obstacles.some(o=>o.x===next.x&&o.y===next.y)){
      gs.status='GAME_OVER'; playing=false
      stopLoop(); stopBgm(); sfxGameOver()
      if(gs.score>0) addRank(gs.score, diffRef)
      renderGrid(); renderInfoPanel(); showOverlay()
      return
    }

    const ateApple = next.x===gs.apple.x && next.y===gs.apple.y
    const ateGolden = gs.goldenApple &&
      next.x===gs.goldenApple.position.x && next.y===gs.goldenApple.position.y

    const grows = ateApple
    gs.snake = grows ? [next,...gs.snake] : [next,...gs.snake.slice(0,-1)]

    if(ateApple) gs.score += 1
    if(ateGolden){ gs.score += GOLDEN_PTS; gs.goldenApple=null }

    if(ateApple){
      gs.apple = rndPos([...gs.snake,...gs.obstacles,...(gs.goldenApple?[gs.goldenApple.position]:[])])
      sfxApple()
      spawnPopup(gs.apple.x>0?{x:next.x,y:next.y}:{x:next.x,y:next.y}, '+1', false)
    }
    if(ateGolden){
      sfxGolden()
      spawnPopup({x:next.x,y:next.y}, `+${GOLDEN_PTS}`, true)
    }

    gs.speed = calcSpeed(diffRef, gs.score)
    speedRef = gs.speed

    // 지옥 장애물
    if(ateApple && diffRef==='HELL'){
      const target=calcObsCount(gs.score)
      if(target > gs.obstacleGroupCount){
        const taken=[...gs.snake,gs.apple,...gs.obstacles,...(gs.goldenApple?[gs.goldenApple.position]:[]) ]
        const group=spawnShape(taken, gs.obstacleGroupCount)
        gs.obstacles=[...gs.obstacles,...group]
        gs.obstacleGroupCount++
        obsRef=gs.obstacles
        sfxObs()
      }
    }

    // 황금사과 스폰
    if(ateApple && (diffRef==='HARD'||diffRef==='HELL') && !gs.goldenApple){
      if(Math.random()<GOLDEN_CHANCE){
        const taken=[...gs.snake,gs.apple,...gs.obstacles]
        gs.goldenApple={ position:rndPos(taken), expiresAt:now+GOLDEN_TTL }
      }
    }
  }

  renderGrid()
  renderInfoPanel()
}

function spawnPopup(pos, text, isGolden){

const S1_HEADERS=['항목','1월','2월','3월','4월','5월','6월','합계']
const S1_ROWS=[
  ['인건비',   '12,500,000','12,500,000','12,500,000','12,500,000','12,500,000','12,500,000','75,000,000'],
  ['임차료',    '3,200,000', '3,200,000', '3,200,000', '3,200,000', '3,200,000', '3,200,000','19,200,000'],

  ['소모품비',    '230,000',   '180,000',   '310,000',   '190,000',   '270,000',   '220,000', '1,400,000'],
  ['교통비',      '890,000',   '760,000',   '820,000',   '910,000',   '840,000',   '780,000', '5,000,000'],
  ['접대비',    '1,200,000',   '980,000', '1,100,000', '1,350,000', '1,050,000', '1,020,000', '6,700,000'],
  ['교육훈련비',  '500,000',   '500,000',   '500,000',   '500,000',   '500,000',   '500,000', '3,000,000'],
  ['광고선전비','2,100,000', '1,800,000', '2,400,000', '2,200,000', '1,950,000', '2,050,000','12,500,000'],
  ['합계',    '21,070,000','20,300,000','21,240,000','21,300,000','20,730,000','20,660,000','125,300,000'],
]
const S1_COLS=15
const COL_W=[40,130,92,92,92,92,92,92,92,92,92,92,92,92,92]
const S1_STORE='sheet1-cell-data'

function getS1Default(r,c){
  if(r===1&&c<S1_HEADERS.length) return S1_HEADERS[c]
  const dr=r-3
  if(dr>=0&&dr<S1_ROWS.length&&c<S1_ROWS[dr].length) return S1_ROWS[dr][c]
  return ''
}

function loadS1Overrides(){ try{ return JSON.parse(localStorage.getItem(S1_STORE)||'{}') }catch{ return {} } }
function saveS1Overrides(o){ localStorage.setItem(S1_STORE, JSON.stringify(o)) }

function initSheet1(){
  const wrap=document.getElementById('s1-wrap')
  const overrides=loadS1Overrides()
  const TOTAL_ROWS_S1=30

  let editCell=null, editVal=''

  function getCellVal(r,c){
    const k=`${r}-${c}`
    return k in overrides ? overrides[k] : getS1Default(r,c)
  }

  function commit(r,c,val){
    const k=`${r}-${c}`
    const def=getS1Default(r,c)
    if(val===def) delete overrides[k]
    else overrides[k]=val
    saveS1Overrides(overrides)
    editCell=null
    renderS1()
  }

  function renderS1(){
    const isHdr=r=>r===1
    const isTotal=r=>r===3+S1_ROWS.length-1

    let html=`<table class="s1-tbl"><colgroup>`
    // rnum col
    html+=`<col style="width:40px">`
    for(let c=0;c<S1_COLS;c++) html+=`<col style="width:${COL_W[c+1]||80}px">`
    html+=`</colgroup><thead><tr><th class="s1-rnum"></th>`
    for(let c=0;c<S1_COLS;c++) html+=`<th>${String.fromCharCode(65+c)}</th>`
    html+=`</tr></thead><tbody>`

    for(let r=0;r<TOTAL_ROWS_S1;r++){
      const hdr=isHdr(r), tot=isTotal(r)
      html+=`<tr>`
      html+=`<td class="s1-rnum">${r+1}</td>`
      for(let c=0;c<S1_COLS;c++){
        const key=`${r}-${c}`
        const val=getCellVal(r,c)
        const isEditing= editCell===key
        const isNumCol= c>0
        let cls=''
        if(hdr) cls='s1-hdr' // handled via row
        else if(tot) cls='s1-total s1-num'
        else if(c===0&&r>=3&&r<3+S1_ROWS.length) cls='s1-lbl'
        else if(isNumCol&&val) cls='s1-num'

        if(isEditing){
          html+=`<td class="${cls} editing" data-r="${r}" data-c="${c}">
            <input id="s1-inp" value="${escHtml(editVal)}" style="width:${COL_W[c]||80}px;height:22px;border:none;outline:none;background:transparent;font-size:12px;padding:0 4px;font-family:inherit;">
          </td>`
        } else {
          html+=`<td class="${cls}" data-r="${r}" data-c="${c}">${escHtml(val)}</td>`
        }
      }
      html+=`</tr>`
    }
    html+=`</tbody></table>`

    wrap.innerHTML=html

    // 이벤트
    wrap.querySelectorAll('td[data-r]').forEach(td=>{
      td.addEventListener('dblclick',()=>{
        const r=+td.dataset.r, c=+td.dataset.c
        editCell=`${r}-${c}`; editVal=getCellVal(r,c); renderS1()
        const inp=document.getElementById('s1-inp')
        if(inp){ inp.focus(); inp.select() }
      })
    })

    const inp=document.getElementById('s1-inp')
    if(inp){
      inp.focus(); inp.select()
      inp.addEventListener('input',e=>{ editVal=e.target.value })
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter'||e.key==='Tab'){
          e.preventDefault()
          const [r,c]=editCell.split('-').map(Number)
          commit(r,c,inp.value)
        }
        if(e.key==='Escape'){ editCell=null; renderS1() }
      })
      inp.addEventListener('blur',()=>{
        if(editCell){
          const [r,c]=editCell.split('-').map(Number)
          commit(r,c,inp.value)
        }
      })
    }
  }

  renderS1()
}

/* ════════════════════════════════════════
   Sheet3 랭킹
════════════════════════════════════════ */
const MEDAL=['🥇','🥈','🥉']
const SECTION_STYLE={
  NORMAL:{hdrBg:'#1b5e20',hdrTxt:'#fff',gold:'#fff9c4',silver:'#f5f5f5',bronze:'#fff3e0',score:'#1b5e20'},
  HARD:  {hdrBg:'#e65100',hdrTxt:'#fff',gold:'#fff9c4',silver:'#f5f5f5',bronze:'#fff3e0',score:'#e65100'},
  HELL:  {hdrBg:'#b71c1c',hdrTxt:'#fff',gold:'#fff9c4',silver:'#f5f5f5',bronze:'#fff3e0',score:'#b71c1c'},
}
const SW={rank:36,nick:148,score:66}
const RNUMW=40, DIVW=16
const DIFFS=['NORMAL','HARD','HELL']

function renderSheet3(){
  const wrap=document.getElementById('s3-wrap')
  const ranks=loadRanks()
  const nick=loadNick()
  const byDiff=d=>ranks.filter(r=>r.difficulty===d)
  const maxRows=Math.max(0,...DIFFS.map(d=>byDiff(d).length))
  const totalW=RNUMW+DIFFS.length*(SW.rank+SW.nick+SW.score)+(DIFFS.length-1)*DIVW+40

  const colW=`style="width:${SW.rank}px"`, colN=`style="width:${SW.nick}px"`, colS=`style="width:${SW.score}px"`

  // 헤더 행 (열 라벨)
  let colGrp=`<col style="width:${RNUMW}px">`
  DIFFS.forEach((d,i)=>{
    if(i>0) colGrp+=`<col style="width:${DIVW}px">`
    colGrp+=`<col style="width:${SW.rank}px"><col style="width:${SW.nick}px"><col style="width:${SW.score}px">`
  })

  let thRow=`<th class="s3-rnum"></th>`
  DIFFS.forEach((d,i)=>{
    if(i>0) thRow+=`<th style="width:${DIVW}px;background:#f0f0f0"></th>`
    thRow+=`<th>순위</th><th>닉네임</th><th>점수</th>`
  })

  let rows=''
  // 행1: 타이틀
  rows+=`<tr style="height:28px"><td class="s3-rnum">1</td>`
  rows+=`<td colspan="${1+DIFFS.length*3+(DIFFS.length-1)}" style="background:#212121;color:#fff;font-weight:700;font-size:13px;padding:0 12px">🐍 Snake Game — 명예의 전당</td></tr>`

  // 행2: 닉네임
  rows+=`<tr style="height:26px"><td class="s3-rnum">2</td>`
  rows+=`<td colspan="2" style="background:#f9f9f9;font-size:10px;color:#aaa;padding:0 6px">내 닉네임</td>`
  rows+=`<td colspan="${DIFFS.length*3+(DIFFS.length-1)-2}" style="padding:0 6px;font-size:13px;font-weight:500">${escHtml(nick)}</td></tr>`

  // 행3: 빈 행
  rows+=`<tr style="height:10px"><td class="s3-rnum">3</td><td colspan="${1+DIFFS.length*3+(DIFFS.length-1)}"></td></tr>`

  // 행4: 섹션 헤더
  rows+=`<tr style="height:30px"><td class="s3-rnum">4</td>`
  DIFFS.forEach((d,i)=>{
    const s=SECTION_STYLE[d]
    if(i>0) rows+=`<td style="background:#f0f0f0;width:${DIVW}px"></td>`
    rows+=`<td colspan="3" style="background:${s.hdrBg};color:${s.hdrTxt};font-weight:700;font-size:13px;text-align:center">${DIFF[d].emoji} ${DIFF[d].label} (${byDiff(d).length}명)</td>`
  })
  rows+=`</tr>`

  // 행5: 서브헤더
  rows+=`<tr style="height:20px"><td class="s3-rnum">5</td>`
  DIFFS.forEach((d,i)=>{
    if(i>0) rows+=`<td style="background:#f9f9f9"></td>`
    rows+=`<td style="background:#f2f2f2;text-align:center;font-size:10px;color:#666">순위</td>`
    rows+=`<td style="background:#f2f2f2;font-size:10px;color:#666;padding:0 4px">닉네임</td>`
    rows+=`<td style="background:#f2f2f2;text-align:right;font-size:10px;color:#666;padding:0 4px">점수</td>`
  })
  rows+=`</tr>`

  // 데이터 행
  if(maxRows===0){
    rows+=`<tr style="height:28px"><td class="s3-rnum">6</td>`
    rows+=`<td colspan="${1+DIFFS.length*3+(DIFFS.length-1)}" style="font-size:11px;color:#aaa;font-style:italic;padding:0 12px">아직 기록이 없습니다. Sheet2에서 게임을 즐겨보세요!</td></tr>`
  } else {
    for(let ri=0;ri<maxRows;ri++){
      const rank=ri+1
      const isTop3=rank<=3
      const rowH=28
      rows+=`<tr style="height:${rowH}px"><td class="s3-rnum">${ri+6}</td>`
      DIFFS.forEach((d,si)=>{
        const s=SECTION_STYLE[d]
        const entry=byDiff(d)[ri]||null
        const bg=isTop3?(rank===1?s.gold:rank===2?s.silver:s.bronze):(ri%2===0?'#fff':'#fafafa')
        if(si>0) rows+=`<td style="background:#f9f9f9"></td>`
        // 순위
        rows+=`<td style="background:${bg};text-align:center">`
        if(entry){ rows+=isTop3?`<span style="font-size:14px">${MEDAL[ri]}</span>`:`<span style="font-size:11px;color:#888">${rank}</span>` }
        rows+=`</td>`
        // 닉네임
        rows+=`<td style="background:${bg};padding:0 4px;font-size:${isTop3?12:11}px;font-weight:${isTop3?500:400};color:#${isTop3?'333':'666'};max-width:${SW.nick}px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">`
        if(entry) rows+=escHtml(entry.nickname)
        rows+=`</td>`
        // 점수
        rows+=`<td style="background:${bg};text-align:right;padding:0 6px;font-weight:700;font-size:${isTop3?13:11}px;color:${s.score}">`
        if(entry) rows+=entry.score
        rows+=`</td>`
      })
      rows+=`</tr>`
    }
  }

  wrap.innerHTML=`<table class="s3-tbl"><colgroup>${colGrp}</colgroup>
    <thead><tr>${thRow}</tr></thead><tbody>${rows}</tbody></table>`
}

/* ════════════════════════════════════════
   시트 전환
════════════════════════════════════════ */
function switchSheet(id){
  document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('active'))
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  document.getElementById('tab-'+id).classList.add('active')
  if(id==='s3') renderSheet3()
}

/* ════════════════════════════════════════
   키보드
════════════════════════════════════════ */
const editingInputTags=new Set(['INPUT','TEXTAREA'])
document.addEventListener('keydown',e=>{
  if(editingInputTags.has(document.activeElement?.tagName||'')) return
  const s2active=document.getElementById('s2').classList.contains('active')
  if(!s2active) return
  switch(e.key){
    case 'ArrowUp':   case 'w': case 'W': e.preventDefault(); pendDir='UP';    break
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); pendDir='DOWN';  break
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); pendDir='LEFT';  break
    case 'ArrowRight':case 'd': case 'D': e.preventDefault(); pendDir='RIGHT'; break
    case ' ':
      e.preventDefault()
      if(!gs||gs.status==='IDLE'||gs.status==='GAME_OVER') onStart()
      else if(gs.status==='PLAYING'){ gs.status='PAUSED'; playing=false; stopLoop(); stopBgm(); showOverlay() }
      else if(gs.status==='PAUSED') onResume()
      break
    case 'Escape':
      if(gs&&gs.status==='PLAYING'){ gs.status='PAUSED'; playing=false; stopLoop(); stopBgm(); showOverlay() }
      break
  }
})
